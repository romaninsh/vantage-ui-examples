name: BDD UI Examples

# Launches the published Vantage UI binary and drives it over MCP.
# Runs on macOS because the published binary is a macOS (aarch64) DMG.
#
# Reusable: the bdd-nightly / bdd-stable wrappers call this with a
# channel so each gets its own status badge. Can also be run manually
# (workflow_dispatch) against an ad-hoc channel/version. The binary is
# downloaded + cached by the test-framework launcher from
# $VANTAGE_UI_CHANNEL / $VANTAGE_UI_VERSION.
on:
  workflow_call:
    inputs:
      channel:
        description: "Release channel: stable or main (nightly)."
        type: string
        default: "stable"
      version:
        description: "Version to test (e.g. 0.12.0, latest)."
        type: string
        default: "latest"
  workflow_dispatch:
    inputs:
      channel:
        description: "Release channel: stable or main (nightly)."
        type: choice
        options: [stable, main]
        default: "stable"
      version:
        description: "Version to test (e.g. 0.12.0, latest)."
        required: false
        default: "latest"

jobs:
  # Run 1 — the published-binary sweep over every app. Periscope opts out via
  # `apps/periscope/.bdd-skip` (it needs a live cluster; see the `kubernetes`
  # job below). Runs on both channels. (Job id kept as `bdd` so the existing
  # "bdd / bdd" status check stays stable.)
  bdd:
    runs-on: macos-14 # Apple silicon — matches the aarch64 DMG
    timeout-minutes: 30
    steps:
      # Lay the two repos out as siblings so the workspace's `../vantage`
      # patch resolves. DEV-ONLY: launch-control's bundled server builds
      # against unreleased vantage-sql (`fetch_window` for SQLite), so the
      # root Cargo.toml [patch.crates-io]'s every vantage crate at ../vantage.
      # Remove this checkout once those land on crates.io and the patch is
      # dropped (vantage-sql 0.6.x / vantage-table 0.6.x).
      - name: Checkout examples
        uses: actions/checkout@v4
        with:
          path: vantage-ui-examples

      - name: Checkout vantage (for the ../vantage workspace patch)
        uses: actions/checkout@v4
        with:
          repository: romaninsh/vantage
          ref: sqlite-fetch-window
          path: vantage

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: vantage-ui-examples

      # launch-control's BDD needs its bundled REST server; the harness
      # builds/seeds/serves it itself, but build it up front so the (heavy)
      # compile is its own cached, legible step.
      - name: Build launch-control server
        working-directory: vantage-ui-examples
        run: cargo build -p launch-control-server

      - name: Run BDD suite against all apps
        working-directory: vantage-ui-examples
        run: cargo run -p test-framework -- --all
        env:
          VANTAGE_UI_VERSION: ${{ inputs.version }}
          VANTAGE_UI_CHANNEL: ${{ inputs.channel }}
          RUST_BACKTRACE: 1

  # A second `kubernetes` job used to drive Periscope against a live cluster
  # (colima + k3s on the macOS runner). Disabled — GitHub-hosted macOS runners
  # can't do the nested virtualization colima's `vz` driver needs, so it failed
  # at cluster startup on every run (incl. unrelated PRs). Restore it from git
  # history onto a self-hosted Apple-Silicon runner (where `vz` works), or
  # re-home the cluster to a Linux runner with kind/k3d. Tracked in VAN-16.
