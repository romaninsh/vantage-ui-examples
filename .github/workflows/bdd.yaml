name: BDD UI Examples

# Launches the published Vantage UI binary and drives it over MCP.
# Runs on macOS because the published binary is a macOS (aarch64) DMG.
on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version to test (e.g. 0.12.0, latest)"
        required: false
        default: "latest"
  # pull_request:

jobs:
  bdd:
    runs-on: macos-14
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Run BDD suite against all apps
        run: cargo run -p test-framework -- --all
        env:
          VANTAGE_UI_VERSION: ${{ github.event.inputs.version || 'latest' }}
          RUST_BACKTRACE: 1
