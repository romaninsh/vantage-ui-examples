# yaml-language-server: $schema=./table-schema-1.json
# Table: secrets — metadata only. We project the secret `type` and a `keys`
# count; the actual values are never read into a row.
datasource: cluster
title: Secrets
table: "api/v1/secrets"

columns:
  - { name: id, type: string, flags: [id] }
  - { name: name, type: string, flags: [title, searchable] }
  - { name: namespace, type: string, references: namespaces }
  - { name: type, type: string }
  - { name: keys, type: int }
  - { name: age, type: string }
