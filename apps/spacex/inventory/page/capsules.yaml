# yaml-language-server: $schema=./page-schema-1.json

# Page: capsules — list view over `table/capsules.yaml`.

title: Capsules

elements:
  - kind: tableview
    spot: body
    table: capsules
    params:
      columns:
        id: { pin: true, width: 100, label: ID }
        status:
          width: 130
          label: Status
          color:
            success: [active]
            muted: [unknown, retired]
            red: [destroyed, lost]
        type: { width: 140, label: Type }
        reuse_count: { width: 110, label: Reuses }
        landings: { width: 110, label: Landings }
        original_launch: { width: 200, label: Original launch }
