# yaml-language-server: $schema=./table-schema-1.json

# Table: locations — spaceports.
#
# NOTE (data surprise for Neo): `country` arrives as a nested object in the
# 2.3.0 dev API, surfaced here as the dotted leaf `country.name`.
#
# The `pads` relation drills into pads via `?location__id=<this location id>`
# — verified discriminating (location 12 → 24 pads). This is the first hop of
# the two-hop story: location → pads → launches.

datasource: ll2
title: Locations
table: "locations/"

columns:
  - { name: id, type: string, flags: [id] }
  - { name: name, type: string, flags: [title, searchable] }
  - { name: country.name, type: string }
  - { name: celestial_body.id, type: int, flags: [hidden] }
  - { name: celestial_body.name, type: string }
  - { name: active, type: bool }
  - { name: description, type: string, flags: [searchable] }
  - { name: timezone_name, type: string }
  - { name: latitude, type: float }
  - { name: longitude, type: float }
  - { name: total_launch_count, type: int }
  - { name: total_landing_count, type: int }

references:
  pads:
    table: pads
    kind: has_many
    foreign_key: location__id
