# yaml-language-server: $schema=./table-schema-1.json

# Table: pads — physical launch pads.
#
# NOTE (data surprise for Neo): `country` arrives as a nested object in the
# 2.3.0 dev API (not the scalar string the spec assumed), so it is surfaced as
# the dotted leaf `country.name`. `location.name` is the belongs-to spaceport.
#
# The `launches` relation drills into launches via `?pad=<this pad id>`
# — verified discriminating (pad 82 → 12 launches).

datasource: ll2
title: Pads
table: "pads/"

columns:
  - { name: id, type: string, flags: [id] }
  - { name: name, type: string, flags: [title, searchable] }
  - { name: country.name, type: string }
  - { name: location.id, type: string, flags: [hidden], references: locations }
  - { name: location.name, type: string }
  - { name: active, type: bool }
  - { name: description, type: string }
  - { name: latitude, type: float }
  - { name: longitude, type: float }
  - { name: total_launch_count, type: int }
  - { name: orbital_launch_attempt_count, type: int }
  - { name: fastest_turnaround, type: string }

references:
  launches:
    table: launches
    kind: has_many
    foreign_key: pad
