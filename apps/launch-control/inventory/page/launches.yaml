# Page: launches — THE screen. A `binder`: launches grid on top; selecting a
# launch fills the bottom with auto-derived tabs — a Details form plus one grid
# per relation (payloads / crew / landings). From there you keep drilling:
# a landing → its landpad, the details form's provider / rocket / pad → location.
#
# The page polls `last_updated` cheaply via `refresh_probe`; only when the live
# simulator changes a launch does it do a full refresh — and diorama never blanks
# the grid on one of the server's injected 503s.

title: Launches
layout: binder

elements:
  - kind: tableview
    spot: body
    table: launches
    params:
      # Sort by last_updated so the launch the simulator is currently driving
      # (freshest timestamp) rises to the top — live activity on top.
      default_sort: { column: last_updated, direction: desc }
      refresh_interval: 5
      # Cheap change probe: fold over the rows for count + newest `last_updated`
      # (the simulator bumps it on every step). We can't `add_order` here — the
      # generic api-client backend doesn't mark columns orderable, since a remote
      # API may not accept `?ordering=` on an arbitrary field. The whole result
      # set fits one page, so the fold sees every launch.
      refresh_probe: |
        let rows = page_table().list();
        let latest = "";
        for r in rows {
            let u = r.last_updated;
            if u != () && u > latest { latest = u; }
        }
        "" + rows.len() + "@" + latest
      columns:
        name:
        status.name:
          color:
            green: ["Go for Launch", "Launch Successful"]
            yellow: ["Launch in Flight", "To Be Confirmed", "To Be Determined", "On Hold"]
            red: ["Launch Failure", "Launch was a Partial Failure"]
        webcast_live:
          label: Live
        net:
        launch_service_provider.name:
          label: Provider
        rocket_configuration.name:
          label: Rocket
        pad.name:
          label: Pad
        payload_count:
        crew_count:
        total_payload_mass:
        last_updated:
