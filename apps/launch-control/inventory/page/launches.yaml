# Page: launches — THE screen. A `binder`: launches grid on top; selecting a
# launch fills the bottom with auto-derived tabs — a Details form plus one grid
# per relation (payloads / crew / landings). From there you keep drilling:
# a landing → its landpad, the details form's provider / rocket / pad → location.
#
# The page polls `last_updated` cheaply via `refresh_probe`; only when the live
# simulator changes a launch does it do a full refresh — and diorama never blanks
# the grid on one of the server's injected 503s.

title: Launches
layout: binder

elements:
  - kind: crud
    spot: body
    table: launches
    # Custom read-only summary tab (view/launch_summary.yaml), appended after
    # the auto-derived Details / Crew / Payloads / Landings tabs.
    views:
      - launch_summary
    toolbar:
      - label: "New simulated launch"
        icon: Play
        action: |
          let r = actions.new_launch();
          actions.submit_launch(r.lsp_id, r.pad_id, r.rocket_configuration_id, r.name);
    params:
      # Client-side default sort by `last_updated`, newest first. The Dio sorts
      # over its cache and re-applies it after every refresh, so the launch the
      # simulator just touched floats to the top. (Because `last_updated` ticks
      # constantly, the order legitimately reshuffles as the sim runs; switch the
      # column to `net` for a stable order that doesn't move on refresh.)
      default_sort:
        column: last_updated
        direction: desc
      # 1s so the summary's live telemetry tracks the simulator's ~2s stamps
      # (the projection smooths the gaps; the latency readout shows the lag).
      refresh_interval: 1
      # Cheap change probe: fold over the rows for count + newest `last_updated`
      # (the simulator bumps it on every step). We can't `add_order` here — the
      # generic api-client backend doesn't mark columns orderable, since a remote
      # API may not accept `?ordering=` on an arbitrary field. The whole result
      # set fits one page, so the fold sees every launch.
      refresh_probe: |
        let rows = page_table().list();
        let latest = "";
        for r in rows {
            let u = r.last_updated;
            if u != () && u > latest { latest = u; }
        }
        "" + rows.len() + "@" + latest
      columns:
        # Wide enough for the launch name plus its inline status tag (the
        # `status.name` label renders on the title cell) without overlap.
        name:
          width: 400
        status.name:
          color:
            green: ["Go for Launch", "Launch Successful"]
            yellow:
              [
                "Launch in Flight",
                "To Be Confirmed",
                "To Be Determined",
                "On Hold",
              ]
            red: ["Launch Failure", "Launch was a Partial Failure"]
        webcast_live:
          label: Live
        last_updated:
        launch_service_provider.name:
          label: Provider
        rocket_configuration.name:
          label: Rocket
        pad.name:
          label: Pad
        payload_count:
        crew_count:
        total_payload_mass:
        net:
