# yaml-language-server: $schema=./action-schema-1.json
# Toolbar action on the launches page: collect the basics for a simulated
# launch. The FK dropdowns are driven by `options:` Rhai scripts that return a
# table query (a Vista); conditions are applied server-side.
#
# - lsp_id lists only providers that actually manufacture a rocket
#   (`has_rockets == true`, a computed column on the agencies model).
# - rocket_configuration_id reads the selected provider via `form["lsp_id"]`,
#   so picking a provider re-queries the rocket list to that provider's configs.
#   The dependency is inferred from the `form[...]` read — no declaration.
#
# Requires a vantage-ui build with the reactive `options:`/`form[...]` engine.
kind: form
dialog:
  title: "New simulated launch"
  description: "Pick the provider, pad and rocket; the server schedules T-1min and fills in the rest live."
  confirm_label: "Launch simulation"
form:
  table: launches
  fields:
    - name: lsp_id
      label: "Launch provider"
      widget: dropdown
      option_label: name
      options: |
        table("agencies").add_condition_eq("has_rockets", true)
    - name: rocket_configuration_id
      label: "Rocket configuration"
      widget: dropdown
      option_label: full_name
      options: |
        table("launcher_configurations").add_condition_eq("manufacturer_id", form["lsp_id"])
    - name: pad_id
      label: "Pad"
      widget: dropdown
    - { name: name, label: "Mission name", required: false }
