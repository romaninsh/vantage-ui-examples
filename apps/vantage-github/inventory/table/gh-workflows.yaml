# yaml-language-server: $schema=./table-schema-1.json
datasource: gh-stats
title: Build Pipelines
columns:
  - name: id
    type: int
    flags: [id]
  - name: name
    type: string
    flags: [title, searchable]
  - name: state
    type: string
  # Filled in lazily by the `analyze` detail pass; carried into the `runs`
  # drill-down condition by the `runs` reference script below, so the runs
  # detail pass can compute cache-effectiveness without re-deriving it.
  - name: total_crates
    type: int
references:
  runs:
    table: gh-workflow-runs
    kind: has_many
    # Scripted reference: read the (enriched) workflow row and narrow the runs
    # target by workflow id plus the derived crate count.
    rhai: |
      table("gh-workflow-runs")
        .add_condition_eq("workflow_id", row.id)
        .add_condition_eq("total_crates", row.total_crates)
cmd:
  # List pass: cheap — one call lists every workflow.
  rhai: |
    let out = run(["workflows", "romaninsh/vantage"]);
    if out.exit_code != 0 { throw out.stderr; }
    parse_json(out.stdout)
  # Detail pass: expensive — `analyze` samples a few runs and returns the full
  # (cold) build's crate count. That single number is all the runs drill needs.
  # Degrades to 0 when analyze can't find a usable run (the row still hydrates).
  detail: |
    let tc = 0;
    let out = run(["analyze", id.to_string(), "romaninsh/vantage"]);
    if out.exit_code == 0 {
      tc = parse_json(out.stdout).total_crates;
    }
    [#{ "total_crates": tc }]
