# Table agencies — drills into launches via ?lsp__id=<agency id>.

datasource: ll2
title: Agencies
table: "agencies/"

columns:
  - { name: id, type: string, flags: [id] }
  - { name: name, type: string, flags: [title, searchable] }
  - { name: type.name, type: string }

references:
  launches:
    table: launches
    kind: has_many
    foreign_key: lsp__id
