# Table payloads — browsable catalogue. Never auto-opened, so it backs the
# "cache mode on an unopened model errors" assertion.

datasource: ll2
title: Payloads
table: "payloads/"

columns:
  - { name: id, type: string, flags: [id] }
  - { name: name, type: string, flags: [title, searchable] }
  - { name: type.name, type: string }

references:
  flights:
    table: payload_flights
    kind: has_many
    foreign_key: payload.id
